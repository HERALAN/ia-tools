<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA-Tools Arquitectos del Pensamiento</title>
    <style>
        :root {
            --primary-color: #23395d;
            --secondary-color: #406080;
            --accent-color: #27ae60;
            --accent-dark: #1f8f50;
            --bg-color: #eef3f8;
            --text-color: #1d2733;
            --card-color: rgba(255, 255, 255, 0.92);
            --border-color: rgba(35, 57, 93, 0.14);
            --muted-color: #64748b;
            --shadow: 0 18px 45px rgba(30, 41, 59, 0.14);
            --hero-gradient: linear-gradient(135deg, #23395d, #27ae60);
        }

        body.dark-mode {
            --primary-color: #8fb7ff;
            --secondary-color: #b8c7dc;
            --accent-color: #38d47f;
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --card-color: #1e293b;
            --border-color: #334155;
            --muted-color: #94a3b8;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-color);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .prompt-btn {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .prompt-btn:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(35, 57, 93, 0.2);
        }

        .prompt-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        #work-area {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid var(--border-color);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .desc-box {
            background: rgba(35, 57, 93, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary-color);
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(35, 57, 93, 0.1);
        }

        .main-action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .main-action-btn:hover {
            background-color: var(--accent-dark);
            transform: scale(1.01);
        }

        #mensaje-exito {
            display: none;
            text-align: center;
            color: var(--accent-color);
            margin-top: 15px;
            font-weight: 600;
        }

        .ia-links {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 25px;
        }

        .ia-links.visible { display: grid; }

        .ia-btn {
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            transition: opacity 0.2s;
        }

        .ia-btn.chatgpt { background-color: #74aa9c; }
        .ia-btn.claude { background-color: #d97757; }
        .ia-btn.gemini { background-color: #4285f4; }
        .ia-btn:hover { opacity: 0.9; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--muted-color); }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>IA-Tools Arquitectos del Pensamiento</h1>
        <p style="color: var(--muted-color)">Selecciona una herramienta para comenzar</p>
    </header>

    <div class="container">
        <div class="btn-container">
            <button class="prompt-btn" onclick="cargarPrompt('p1')">1. Preparación para Debate Teológico</button>
            <button class="prompt-btn" onclick="cargarPrompt('p2')">2. Escritura de Artículo Teológico</button>
            <button class="prompt-btn" onclick="cargarPrompt('p3')">3. Preparación de Clase Bíblica</button>
            <button class="prompt-btn" onclick="cargarPrompt('p4')">4. Análisis de Libro para Reseña</button>
            <button class="prompt-btn" onclick="cargarPrompt('p5')">5. Análisis de Vídeo de YouTube</button>
            <button class="prompt-btn" onclick="cargarPrompt('p6')">6. Transcripción y Formateo</button>
            <button class="prompt-btn" onclick="cargarPrompt('p7')">7. Análisis de Versículo (Exégesis)</button>
            <button class="prompt-btn" onclick="cargarPrompt('p8')">8. Crítica de Escrito (Puntos de Mejora)</button>
            <button class="prompt-btn" onclick="cargarPrompt('p9')">9. Análisis Doctrinal de Canciones/Cantos</button>
        </div>

        <div id="work-area">
            <h2 id="modulo-titulo" style="margin-bottom: 10px;"></h2>
            <div class="desc-box" id="modulo-desc"></div>

            <div id="dynamic-fields"></div>

            <div id="main-input-container">
                <label id="label-parametro" for="input-parametro"></label>
                <textarea id="input-parametro" rows="6" placeholder="Escribe o pega aquí la información..."></textarea>
            </div>

            <button class="main-action-btn" onclick="generarYCopiar()">Copiar Prompt y Abrir IAs</button>
            <div id="mensaje-exito">¡Prompt copiado al portapapeles con éxito!</div>

            <div class="ia-links" id="ia-links">
                <a href="https://chatgpt.com/" target="_blank" class="ia-btn chatgpt">ChatGPT</a>
                <a href="https://claude.ai/" target="_blank" class="ia-btn claude">Claude</a>
                <a href="https://gemini.google.com/" target="_blank" class="ia-btn gemini">Gemini</a>
            </div>
        </div>
    </div>

    <script>
        const baseDatosPrompts = {
            'p1': {
                titulo: "1. Preparación para Debate Teológico",
                descripcion: "Genera argumentos sólidos, contra-argumentos y respuestas estratégicas sobre un tema específico desde una perspectiva reformada.",
                pregunta: "Introduce el tema o la tesis del debate:",
                plantilla: `Actúa como un experto teólogo reformado y apologista. Prepara un esquema para un debate sobre el siguiente tema: [PARAMETRO]. 
                Estructura la respuesta con: 1. Tesis central, 2. Argumentos bíblicos clave, 3. Posibles objeciones y cómo responderlas, 4. Conclusión contundente.`
            },
            'p2': {
                titulo: "2. Escritura de Artículo Teológico",
                descripcion: "Crea la estructura y el contenido base para un artículo teológico profesional con diferentes opciones de extensión y versiones de la Biblia.",
                pregunta: "Introduce el tema del artículo:",
                plantilla: `Redacta un artículo teológico profundo sobre [PARAMETRO]. 
                Usa un tono académico pero accesible. 
                Duración: [DURACION]. 
                Versión bíblica preferida: [VERSION]. 
                Incluye introducción, desarrollo con puntos clave y aplicación práctica.`
            },
            'p3': {
                titulo: "3. Preparación de Clase Bíblica",
                descripcion: "Diseña un plan de clase completo con objetivos, bosquejo de enseñanza y preguntas de aplicación.",
                pregunta: "Introduce el pasaje bíblico o tema de la clase:",
                plantilla: `Crea un plan de clase detallado para una escuela dominical o estudio bíblico sobre: [PARAMETRO].
                Incluye: 
                - Objetivos de la lección.
                - Rompehielo.
                - Bosquejo del contenido.
                - Aplicación para la vida diaria.
                - 3 preguntas de reflexión.`
            },
            'p4': {
                titulo: "4. Análisis de Libro para Reseña",
                descripcion: "Extrae los puntos principales, tesis central y una evaluación crítica de un libro teológico.",
                pregunta: "Introduce el título del libro y autor (o un resumen del contenido):",
                plantilla: `Realiza un análisis detallado del libro [PARAMETRO]. 
                Identifica: 1. La tesis principal del autor, 2. Los 5 puntos clave, 3. Fortalezas del libro, 4. Posibles puntos de desacuerdo desde una visión confesional.`
            },
            'p5': {
                titulo: "5. Análisis de Vídeo de YouTube",
                descripcion: "Analiza el contenido de un vídeo a partir de su transcripción para evaluar su fidelidad bíblica.",
                pregunta: "Pega aquí la transcripción del vídeo:",
                plantilla: `Analiza la siguiente transcripción de un vídeo y evalúa su contenido teológico:
                [PARAMETRO]
                Busca errores doctrinales, aciertos, y resume el mensaje principal en 3 párrafos.`
            },
            'p6': {
                titulo: "6. Transcripción y Formateo",
                descripcion: "Limpia y organiza textos de transcripciones crudas, corrigiendo gramática y estructurando por párrafos.",
                pregunta: "Pega el texto a formatear:",
                plantilla: `Toma el siguiente texto proveniente de una transcripción y corrígelo. 
                Elimina muletillas, mejora la puntuación y organízalo en párrafos coherentes sin cambiar el sentido de lo dicho:
                [PARAMETRO]`
            },
            'p7': {
                titulo: "7. Análisis de Versículo (Exégesis)",
                descripcion: "Realiza un análisis exegético profundo de un versículo, considerando su contexto original y gramática.",
                pregunta: "Introduce el versículo (ej. Romanos 8:1):",
                plantilla: `Realiza un análisis exegético profundo del versículo: [PARAMETRO].
                Enfoque solicitado: [ENFOQUE].
                Analiza el contexto histórico, el significado de palabras clave en el original (griego/hebreo) y su aplicación teológica actual.`
            },
            'p8': {
                titulo: "8. Crítica de Escrito (Puntos de Mejora)",
                descripcion: "Recibe retroalimentación constructiva sobre tu propio escrito para mejorar claridad, estilo y precisión teológica.",
                pregunta: "Pega aquí tu escrito:",
                plantilla: `Actúa como un editor experto. Analiza el siguiente texto y ofrece 5 puntos de mejora específicos en cuanto a claridad, estilo y precisión teológica:
                [PARAMETRO]
                Al final, sugiere instrucciones adicionales para mejorar el texto: [INSTRUCCIONES]`
            },
            'p9': {
                titulo: "9. Análisis Doctrinal de Canciones/Cantos",
                descripcion: "Analiza letras de canciones o URLs (YouTube, letras.com, etc.) bajo una perspectiva reformada, confesional y bíblica para determinar su fidelidad y seguridad pastoral.",
                pregunta: "Introduce la URL o la letra completa del canto:",
                plantilla: `Analiza doctrinalmente el siguiente canto desde una perspectiva reformada, confesional y bíblica.

# Entrada del usuario

El input puede venir en una de estas dos formas:

1. Letra completa pegada directamente.
2. URL de una página que contiene la letra del canto, por ejemplo YouTube, letras.com u otra fuente similar.

Si el input es una URL:

- No muestres el contenido completo de la letra.
- No resumas la página.
- No expliques el contenido del sitio.
- No entregues el texto completo de la canción.
- Solo usa la letra disponible en la URL como base interna para realizar el análisis doctrinal solicitado.
- Si no puedes acceder a la letra desde la URL, responde únicamente: “No pude leer la letra desde el enlace. Pega aquí la letra completa para analizarla.”
- No inventes letras ni completes partes faltantes.

---

# Formato obligatorio de salida

Al inicio coloca este título:

# Análisis de la canción: [Nombre de la canción]

Coloca solamente el nombre de la canción. No pegues la letra completa.

Quiero dos matrices breves.

---

# 1. Matriz de criterios deseables

Incluye únicamente estas columnas:

| Criterio deseable | ¿Cumple? |

En la columna “Criterio deseable”, coloca el nombre del criterio y una explicación breve dentro de la misma celda.

En “¿Cumple?” usa solo:

- Sí
- No

Evalúa exactamente estos criterios:

1. Fidelidad bíblica: valida si la letra respeta el sentido de la Escritura y no usa textos bíblicos de forma torcida.
2. Cristocentrismo: valida si Cristo aparece como centro, mediador, redentor, Señor y fundamento del acceso a Dios.
3. Teocentrismo: valida si el canto exalta principalmente a Dios y su gloria, no al “yo”, mis emociones o mi experiencia.
4. Claridad doctrinal: valida si las frases son claras, sanas y enseñables para la congregación sin requerir demasiadas aclaraciones.
5. Reverencia en la adoración: valida si el tono honra la santidad, majestad y gloria de Dios, evitando irreverencia o sentimentalismo excesivo.
6. Lenguaje congregacional: valida si la letra sirve para que la iglesia adore como cuerpo, no solo como individuo aislado.
7. Sólida doctrina de Dios: valida si presenta correctamente a Dios como santo, soberano, fiel, justo, misericordioso, trino y digno de adoración.
8. Doctrina correcta de la presencia de Dios: valida si habla de la presencia de Dios de forma bíblica, sin misticismo, manipulación emocional o lenguaje de “atmósfera”.
9. Relación con la Palabra: valida si la letra se somete a la Palabra de Dios y no depende de impresiones subjetivas, revelaciones privadas o frases emocionales sin fundamento.
10. Uso pastoral seguro: valida si el canto edifica, consuela, enseña y ordena los afectos de la iglesia sin formar ideas doctrinales peligrosas.

---

# 2. Matriz de puntos peligrosos

Incluye únicamente estas columnas:

| Criterio peligroso | Nivel de peligrosidad |

En la columna “Criterio peligroso”, coloca el nombre del criterio y una explicación breve dentro de la misma celda.

En “Nivel de peligrosidad” usa solo:

- Bajo
- Medio
- Alto
- Crítico

Evalúa exactamente estos 5 criterios peligrosos fijos:

1. Desplazamiento de Cristo: valida si Cristo queda ausente, secundario o reemplazado por experiencias, emociones, presencia, milagros, atmósferas o lenguaje centrado en el adorador.
2. Mala hermenéutica bíblica: valida si el canto usa textos, personajes o historias bíblicas de forma alegórica, torcida, subjetiva o desconectada del sentido original.
3. Misticismo de la presencia: valida si la presencia de Dios se presenta como ambiente, sensación, lugar especial, atmósfera manipulable o experiencia que depende de intensidad musical/emocional.
4. Antropocentrismo emocional: valida si el canto gira demasiado alrededor del “yo”, mis sentimientos, mi necesidad, mi momento, mi búsqueda o mi experiencia personal.
5. Promesas o declaraciones peligrosas: valida si el canto afirma cosas que Dios no prometió claramente, exagera beneficios, decreta restauraciones, sanidades, milagros o usa frases doctrinalmente ambiguas.

No suavices frases ambiguas. Si una frase necesita demasiada explicación para no sonar mal, márcala como riesgosa.

---

# 3. Veredicto general

Da un juicio breve y directo usando una de estas categorías:

- Aprobado para culto congregacional
- Usable con cautela
- No recomendable
- Descartado

Incluye una explicación breve del porqué.

---

# 4. Pregunta final obligatoria

Al final pregunta exactamente:

¿Qué deseas hacer ahora?

- 1 para “Quiero un documento con más detalles.”
- 2 para “Quiero lo que me has dado en un documento.”
- 3 para “Gracias no quiero nada más.”

Si la respuesta es “1”, genera un archivo PDF con el análisis detallado.

El PDF debe tener esta estructura:

# Análisis del canto: [Nombre del canto]

Debajo del título principal, coloca con letra normal:

Análisis reformado

Después desarrolla el análisis con:

1. Matriz completa de criterios deseables.
2. Matriz completa de puntos peligrosos.
3. Veredicto general.
4. Observaciones doctrinales principales.
5. Dictamen pastoral para uso congregacional.

No incluyas la letra completa del canto en el PDF.

Si la respuesta es “2”, genera un archivo PDF con el resultado breve ya entregado, sin agregar mayor detalle.

El PDF debe tener esta estructura:

# Análisis del canto: [Nombre del canto]

Debajo del título principal, coloca con letra normal:

Análisis reformado

Después incluye únicamente:

1. Matriz breve de criterios deseables.
2. Matriz breve de puntos peligrosos.
3. Veredicto general.

No incluyas la letra completa del canto en el PDF.

Si la respuesta es “3”, no desarrolles nada más y responde únicamente:

Gracias.

---

# Letra o URL del canto a analizar
[PARAMETRO]`
            }
        };

        let promptActual = '';

        function cargarPrompt(id) {
            promptActual = id;
            const config = baseDatosPrompts[id];
            
            // UI Update
            document.querySelectorAll('.prompt-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('modulo-titulo').innerText = config.titulo;
            document.getElementById('modulo-desc').innerText = config.descripcion;
            document.getElementById('label-parametro').innerText = config.pregunta;
            document.getElementById('work-area').style.display = 'block';
            document.getElementById('mensaje-exito').style.display = 'none';
            document.getElementById('ia-links').classList.remove('visible');

            // Limpiar campos dinámicos y valores anteriores
            document.getElementById('dynamic-fields').innerHTML = '';
            document.getElementById('input-parametro').value = '';

            // Generar campos específicos
            if (id === 'p7') {
                const html = `
                    <div class="form-group">
                        <label>Enfoque del análisis:</label>
                        <input type="text" id="input-enfoque" placeholder="Ej. Pastoral, Lingüístico, Doctrina de la Gracia...">
                    </div>
                `;
                document.getElementById('dynamic-fields').innerHTML = html;
            }

            if (id === 'p8') {
                const html = `
                    <div class="form-group">
                        <label>Instrucciones adicionales (opcional):</label>
                        <input type="text" id="inst-adic" placeholder="Ej. Hazlo más formal, enfócate en la gramática...">
                    </div>
                `;
                document.getElementById('dynamic-fields').innerHTML = html;
            }

            if (id === 'p2') {
                const html = `
                    <label>Extensión aproximada:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="duracion" value="Corto (500 palabras)" checked> Corto</label>
                        <label><input type="radio" name="duracion" value="Medio (1000 palabras)"> Medio</label>
                        <label><input type="radio" name="duracion" value="Extenso (2000 palabras)"> Extenso</label>
                    </div>
                    <label>Versión Bíblica:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="version" value="Reina Valera 1960" checked> RVR1960</label>
                        <label><input type="radio" name="version" value="Nueva Biblia de las Américas"> NBLA</label>
                        <label><input type="radio" name="version" value="La Biblia de las Américas"> LBLA</label>
                    </div>
                `;
                document.getElementById('dynamic-fields').innerHTML = html;
            }

            // Auto-focus al campo de texto principal
            setTimeout(() => {
                document.getElementById('input-parametro').focus();
            }, 100);

            // Scroll suave
            document.getElementById('work-area').scrollIntoView({ behavior: 'smooth' });
        }

        function generarYCopiar() {
            let textoFinal = baseDatosPrompts[promptActual].plantilla;

            if (promptActual === 'p8') {
                const valorUsuario = document.getElementById('input-parametro').value;
                textoFinal = textoFinal.replace('[PARAMETRO]', valorUsuario);
                textoFinal = textoFinal.replace('[INSTRUCCIONES]', document.getElementById('inst-adic').value || 'Ninguna');
            } else {
                const valorUsuario = document.getElementById('input-parametro').value;
                textoFinal = textoFinal.replace('[PARAMETRO]', valorUsuario);

                if (promptActual === 'p7') {
                    const enfoque = document.getElementById('input-enfoque').value || 'No especificado';
                    textoFinal = textoFinal.replace('[ENFOQUE]', enfoque);
                }

                if (promptActual === 'p2') {
                    const dur = document.querySelector('input[name="duracion"]:checked').value;
                    const ver = document.querySelector('input[name="version"]:checked').value;
                    textoFinal = textoFinal.replace('[DURACION]', dur).replace('[VERSION]', ver);
                }
            }

            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = textoFinal;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            const msj = document.getElementById('mensaje-exito');
            msj.style.display = 'block';
            document.getElementById('ia-links').classList.add('visible');
            document.getElementById('ia-links').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
