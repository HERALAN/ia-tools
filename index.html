    <style>
        :root {
            --primary-color: #23395d;
            --secondary-color: #406080;
            --accent-color: #27ae60;
            --accent-dark: #1f8f50;
            --bg-color: #eef3f8;
            --text-color: #1d2733;
            --card-color: rgba(255, 255, 255, 0.92);
            --border-color: rgba(35, 57, 93, 0.14);
            --muted-color: #64748b;
            --shadow: 0 18px 45px rgba(30, 41, 59, 0.14);
            --hero-gradient: linear-gradient(135deg, #23395d, #27ae60);
        }

        body.dark-mode {
            --primary-color: #8fb7ff;
            --secondary-color: #b8c7dc;
            --accent-color: #38d47f;
            --accent-dark: #20a85e;
            --bg-color: #0f172a;
            --text-color: #e5edf7;
            --card-color: rgba(15, 23, 42, 0.88);
            --border-color: rgba(255, 255, 255, 0.12);
            --muted-color: #aab7c8;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            --hero-gradient: linear-gradient(135deg, #6ea8ff, #38d47f);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(39, 174, 96, 0.18), transparent 32%),
                radial-gradient(circle at top right, rgba(44, 62, 80, 0.16), transparent 30%),
                var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: clamp(14px, 3vw, 28px);
            max-width: 1050px;
            margin: auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .main-content { flex: 1; width: 100%; }

        .hero {
            text-align: center;
            padding: clamp(22px, 5vw, 52px) clamp(16px, 4vw, 44px);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            border-radius: 28px;
            background: var(--card-color);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        h1 {
            text-align: center;
            margin: 0;
            font-size: clamp(4rem, 14vw, 9.5rem);
            line-height: 0.9;
            letter-spacing: -0.08em;
            font-weight: 900;
            text-transform: none;
            background: var(--hero-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 16px 36px rgba(35, 57, 93, 0.16);
        }

        .subtitle,
        .section-title {
            text-align: center;
            color: var(--secondary-color);
            font-size: clamp(1rem, 2.5vw, 1.28rem);
            font-weight: 700;
            margin: 12px auto 0;
            max-width: 760px;
        }

        .section-title { margin-top: 8px; color: var(--secondary-color); }

        .theme-toggle-wrap {
            display: flex;
            justify-content: center;
            margin: 22px 0 6px;
        }

        .theme-toggle {
            border: 1px solid var(--border-color);
            background: var(--card-color);
            color: var(--text-color);
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .theme-toggle:hover { transform: translateY(-2px); border-color: var(--accent-color); }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
            gap: clamp(10px, 2vw, 16px);
            margin-bottom: 22px;
        }

        .prompt-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: clamp(14px, 2.5vw, 20px);
            min-height: 68px;
            font-size: clamp(0.96rem, 1.8vw, 1.05rem);
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            text-align: left;
            font-weight: 800;
            box-shadow: 0 12px 26px rgba(35, 57, 93, 0.18);
        }

        .prompt-btn:hover { transform: translateY(-3px); filter: brightness(1.05); }
        .hidden { display: none !important; }

        #area-trabajo {
            background: var(--card-color);
            padding: clamp(18px, 4vw, 32px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }

        #titulo-prompt { color: var(--primary-color); margin-top: 0; margin-bottom: 5px; font-size: clamp(1.35rem, 3vw, 2rem); }
        #descripcion-prompt { color: var(--muted-color); font-size: 1em; margin-bottom: 20px; font-style: italic; }
        label { font-weight: 800; display: block; margin-top: 15px; color: var(--secondary-color); }

        textarea,
        input[type="text"] {
            width: 100%;
            padding: 13px 14px;
            margin-top: 8px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            background: rgba(255,255,255,0.86);
            color: #1d2733;
        }

        body.dark-mode textarea,
        body.dark-mode input[type="text"] { background: rgba(2, 6, 23, 0.72); color: var(--text-color); }

        .option-group,
        .radio-group {
            margin: 16px 0;
            padding: clamp(13px, 2vw, 18px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            background-color: rgba(255,255,255,0.46);
        }

        body.dark-mode .option-group,
        body.dark-mode .radio-group { background-color: rgba(2, 6, 23, 0.36); }

        .option-group p,
        .radio-group p {
            margin: 0 0 10px 0;
            font-weight: 900;
            color: var(--secondary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 7px;
        }

        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px 12px; }
        .extra-input { margin-top: 8px; display: none; height: 44px; border-color: var(--accent-color); }

        .copy-btn,
        .home-btn {
            color: white;
            border: none;
            padding: 16px;
            margin-top: 20px;
            width: 100%;
            font-size: clamp(1rem, 2vw, 1.12rem);
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .copy-btn { background: linear-gradient(135deg, var(--accent-color), var(--accent-dark)); }
        .home-btn { background: linear-gradient(135deg, #64748b, #334155); margin-top: 18px; }
        .copy-btn:hover,
        .home-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

        #mensaje-exito {
            color: var(--accent-color);
            text-align: center;
            font-weight: 900;
            margin: 16px 0 6px;
            display: none;
            padding: 12px;
            border: 1px solid rgba(39, 174, 96, 0.35);
            border-radius: 14px;
            background: rgba(39, 174, 96, 0.10);
            position: sticky;
            top: 12px;
            z-index: 5;
        }

        footer {
            text-align: center;
            font-size: 0.85em;
            color: var(--muted-color);
            margin-top: 42px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .ia-links {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 18px 0 15px 0;
        }

        .ia-links.visible { display: flex; }

        .ia-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: clamp(0.9rem, 2vw, 1rem);
            font-weight: 900;
            padding: 11px 18px;
            min-width: min(165px, 100%);
            border-radius: 999px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .ia-links a:hover { transform: translateY(-2px); opacity: 0.9; }
        .ia-claude { background-color: #c96442; }
        .ia-chatgpt { background-color: #10a37f; }
        .ia-copilot { background-color: #0078d4; }
        .ia-deepseek { background-color: #4d6bfe; }
        .ia-gemini { background-color: #8a4af3; }

        @media (max-width: 560px) {
            body { padding: 12px; }
            .hero { border-radius: 22px; padding: 28px 12px; }
            h1 { font-size: clamp(4rem, 20vw, 6.3rem); }
            .prompt-btn { min-height: auto; text-align: center; }
            .ia-links a { width: 100%; }
        }

body.dark-mode .prompt-btn {

}

body.dark-mode .prompt-btn:hover {
    filter: brightness(1.08);

}

}

    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* Toggle */
body.dark-mode .theme-toggle {
    background: #162033;
    color: #eaf2ff;
    border: 1px solid rgba(255,255,255,0.1);
}

        }

        function generarYCopiar() {
            const datos = baseDatosPrompts[promptActual];
            let textoFinal = datos.plantilla;

            if (promptActual === 'p5') {
                textoFinal = textoFinal.replace('[SITUACION]', obtenerRadio('sit', 'otro-sit-txt'))
                                       .replace('[TEXTOBASE]', document.getElementById('text-base').value || 'No especificado')
                                       .replace('[ENFOQUE]', obtenerChecks('enf', 'otro-enf-txt'))
                                       .replace('[TONO]', obtenerRadio('tono', 'otro-tono-txt'))
                                       .replace('[ADICIONAL]', document.getElementById('inst-adic').value || 'Ninguna');
            } else {
                if (promptActual === 'p2') {
                    const tipo = document.querySelector('input[name="tipoBosquejo"]:checked').value;
                    const ver = document.querySelector('input[name="version"]:checked').value;
                    if (tipo === 'Bosquejo sencillo') {
                        textoFinal = datos.plantillaBosquejoSencillo;
                    } else if (tipo === 'Bosquejo Logico') {
                        textoFinal = datos.plantillaBosquejoLogico;
                    } else {
                        textoFinal = datos.plantillaBosquejoHermeneutico || datos.plantillaBosquejoLogico;
                    }
                    const valorUsuario = document.getElementById('input-parametro').value;
                    textoFinal = textoFinal.replace('[PARAMETRO]', valorUsuario).replace('[TIPO]', tipo).replace('[VERSION]', ver);
                } else {
                    const valorUsuario = document.getElementById('input-parametro').value;
                    textoFinal = textoFinal.replace('[PARAMETRO]', valorUsuario);

                    if (promptActual === 'p7') {
                        const enfoque = document.getElementById('input-enfoque').value || 'No especificado';
                        textoFinal = textoFinal.replace('[ENFOQUE]', enfoque);
                    }
                }
            }

            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = textoFinal;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            const msj = document.getElementById('mensaje-exito');
            msj.style.display = 'block';
            document.getElementById('ia-links').classList.add('visible');
            document.getElementById('ia-links').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
