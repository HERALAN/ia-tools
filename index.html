            const datos = baseDatosPrompts[id];
            document.getElementById('titulo-prompt').innerText = datos.titulo;
            document.getElementById('descripcion-prompt').innerText = datos.descripcion || "";
            document.getElementById('area-trabajo').classList.remove('hidden');
            document.getElementById('area-trabajo').scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            const camposContainer = document.getElementById('campos-parametros');
            const opcionesContainer = document.getElementById('opciones-adicionales');
            camposContainer.innerHTML = '';
            opcionesContainer.innerHTML = '';

            if (id === 'p5') {
                camposContainer.innerHTML = `
                    <div class="option-group">
                        <p>Situación del culto (Selecciona una):</p>
                        <div class="grid-options">
                            <label><input type="radio" name="sit" value="Inicio" onclick="toggleOtro(this, 'otro-sit-txt')"> Inicio</label>
                            <label><input type="radio" name="sit" value="Ministración" onclick="toggleOtro(this, 'otro-sit-txt')"> Ministración</label>
                            <label><input type="radio" name="sit" value="Adoración" onclick="toggleOtro(this, 'otro-sit-txt')"> Adoración</label>
                            <label><input type="radio" name="sit" value="Ofrendas" onclick="toggleOtro(this, 'otro-sit-txt')"> Ofrendas</label>
                            <label><input type="radio" name="sit" value="Cierre" onclick="toggleOtro(this, 'otro-sit-txt')"> Cierre</label>
                            <label><input type="radio" name="sit" value="Otro" onclick="toggleOtro(this, 'otro-sit-txt')"> Otro</label>
                        </div>
                        <input type="text" id="otro-sit-txt" class="extra-input" placeholder="Escriba la situación...">
                    </div>

                    <label>Texto base o pasaje (Opcional):</label>
                    <input type="text" id="text-base" placeholder="Ej: Salmo 121:1-2">

                    <div class="option-group">
                        <p>Enfoques (Puedes marcar varios):</p>
                        <div class="grid-options">
                            <label><input type="checkbox" name="enf" value="Cruz"> Cruz</label>
                            <label><input type="checkbox" name="enf" value="Gratitud"> Gratitud</label>
                            <label><input type="checkbox" name="enf" value="Reverencia"> Reverencia</label>
                            <label><input type="checkbox" name="enf" value="Arrepentimiento"> Arrepentimiento</label>
                            <label><input type="checkbox" name="enf" value="Adoración"> Adoración</label>
                            <label><input type="checkbox" name="enf" value="Soberanía"> Soberanía</label>
                            <label><input type="checkbox" name="enf" value="Gracia"> Gracia</label>
                            <label><input type="checkbox" name="enf" value="Otro" onchange="toggleOtro(this, 'otro-enf-txt')"> Otro</label>
                        </div>
                        <input type="text" id="otro-enf-txt" class="extra-input" placeholder="Escriba el enfoque...">
                    </div>

                    <div class="option-group">
                        <p>Tono del speach (Selecciona uno):</p>
                        <div class="grid-options">
                            <label><input type="radio" name="tono" value="Solemne" onclick="toggleOtro(this, 'otro-tono-txt')"> Solemne</label>
                            <label><input type="radio" name="tono" value="Íntimo" onclick="toggleOtro(this, 'otro-tono-txt')"> Íntimo</label>
                            <label><input type="radio" name="tono" value="Gozoso" onclick="toggleOtro(this, 'otro-tono-txt')"> Gozoso</label>
                            <label><input type="radio" name="tono" value="Reverente" onclick="toggleOtro(this, 'otro-tono-txt')"> Reverente</label>
                            <label><input type="radio" name="tono" value="Exhortativo" onclick="toggleOtro(this, 'otro-tono-txt')"> Exhortativo</label>
                            <label><input type="radio" name="tono" value="Otro" onclick="toggleOtro(this, 'otro-tono-txt')"> Otro</label>
                        </div>
                        <input type="text" id="otro-tono-txt" class="extra-input" placeholder="Escriba el tono...">
                    </div>

                    <label>Instrucciones adicionales:</label>
                    <textarea id="inst-adic" rows="2" placeholder="Ej: conectar con canto, preparar ambiente..."></textarea>
                `;
            } else {
                if (id === 'p7') {
                    camposContainer.innerHTML = `
                        <label>${datos.pregunta}</label>
                        <textarea id="input-parametro" rows="3" placeholder="Ej: Romanos 6:1-4"></textarea>

                        <label>Palabra o frase clave a enfocar (opcional):</label>
                        <input type="text" id="input-enfoque" placeholder="Ej: justificados, sois salvos, fe, carne">
                    `;
                } else {
                    camposContainer.innerHTML = `<label>${datos.pregunta}</label><textarea id="input-parametro" rows="3" placeholder="Escribe aquí..."></textarea>`;
                }

                if (id === 'p2') {
                                opcionesContainer.innerHTML = `
                                    <div class="radio-group">
                                        <p>Tamaño del sermón:</p>
                                        <input type="radio" name="duracion" value="15 mins" checked> Bosquejo corto<br>
                                        <input type="radio" name="duracion" value="45 mins"> Bosquejo completo
                                    </div>
                                    <div class="radio-group">
                                        <p>Versión de la Biblia:</p>
                                        <input type="radio" name="version" value="RVR60" checked> RVR60 
                                        <input type="radio" name="version" value="TLA"> TLA 
                                        <input type="radio" name="version" value="NTV"> NTV 
                                        <input type="radio" name="version" value="NVI"> NVI
                                    </div>`;
                            }
                }
                document.getElementById('mensaje-exito').style.display = 'none';

            // Enfocar el primer campo disponible
            setTimeout(() => {
                const primerCampo = document.querySelector('#campos-parametros textarea, #campos-parametros input[type="text"]');
                if (primerCampo) primerCampo.focus();
            }, 100);
        }

        function obtenerRadio(name, otroId) {
            const rb = document.querySelector(`input[name="${name}"]:checked`);
            if (!rb) return 'No especificado';
            return rb.value === "Otro" ? document.getElementById(otroId).value : rb.value;
        }

        function obtenerChecks(name, otroId) {
            let sel = Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(c => c.value);
            if (sel.includes("Otro")) {
                sel = sel.filter(v => v !== "Otro");
                const val = document.getElementById(otroId).value;
                if (val) sel.push(val);
            }
            return sel.join(', ') || 'No especificado';
        }

        function generarYCopiar() {
            const datos = baseDatosPrompts[promptActual];
            let textoFinal = datos.plantilla;

            if (promptActual === 'p5') {
                textoFinal = textoFinal.replace('[SITUACION]', obtenerRadio('sit', 'otro-sit-txt'))
                                       .replace('[TEXTOBASE]', document.getElementById('text-base').value || 'No especificado')
                                       .replace('[ENFOQUE]', obtenerChecks('enf', 'otro-enf-txt'))
                                       .replace('[TONO]', obtenerRadio('tono', 'otro-tono-txt'))
                                       .replace('[ADICIONAL]', document.getElementById('inst-adic').value || 'Ninguna');
            } else {
                const valorUsuario = document.getElementById('input-parametro').value;
                 textoFinal = textoFinal.replace('[PARAMETRO]', valorUsuario);

                if (promptActual === 'p7') {
                const enfoque = document.getElementById('input-enfoque').value || 'No especificado';
                textoFinal = textoFinal.replace('[ENFOQUE]', enfoque);
                }

                if (promptActual === 'p2') {
                    const dur = document.querySelector('input[name="duracion"]:checked').value;
                    const ver = document.querySelector('input[name="version"]:checked').value;
                    textoFinal = textoFinal.replace('[DURACION]', dur).replace('[VERSION]', ver);
                }
            }

            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = textoFinal;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            // Mostrar mensaje brevemente y luego resetear todo
            const msj = document.getElementById('mensaje-exito');
            msj.style.display = 'block';
            setTimeout(() => {
                msj.style.display = 'none';
                // Colapsar área de trabajo y limpiar estado
                document.getElementById('area-trabajo').classList.add('hidden');
                document.getElementById('titulo-prompt').innerText = '';
                document.getElementById('descripcion-prompt').innerText = '';
                document.getElementById('campos-parametros').innerHTML = '';
                document.getElementById('opciones-adicionales').innerHTML = '';
                promptActual = '';
                // Scroll al inicio
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 2000);
        }
    </script>
</body>
</html>
